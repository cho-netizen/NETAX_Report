<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b2a41'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='34' font-weight='700' fill='%23c9a227' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">
<title>이음세무컨설팅 NETAX  | 자문보고서 열람</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
<!-- 2026.07: 보고서작성시스템(desk.netax.kr/report-writer)이 렌더링을 전담하고, 여기서는
     완성된 결과(HTML)를 그대로 표시만 한다. marked/mermaid/KaTeX/Chart.js/Prism 등
     렌더링 라이브러리는 더 이상 이 페이지에서 필요하지 않으므로 제거함. -->
<style>
  :root {
    --navy: #0D1B3D;
    --navy-deep: #081226;
    --cream: #F8F6F0;
    --gold: #C8A244;
    --gold-light: #DCC17E;
    --error: #B14545;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy-deep);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(176,141,87,0.08), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(176,141,87,0.06), transparent 45%);
    color: var(--cream);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--navy);
    border: 1px solid rgba(176,141,87,0.25);
    border-radius: 4px;
    padding: 48px 36px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
    border-radius: 4px 4px 0 0;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
    border-radius: 0 0 4px 4px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 27px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 22px;
    color: var(--cream);
  }

  h1::after {
    content: '';
    display: block;
    width: 48px;
    height: 2px;
    background: var(--gold);
    margin: 22px auto 0;
  }

  .footer-highlight .highlight-strong {
    font-family: 'Nanum Myeongjo', serif;
    color: var(--gold-light);
    font-weight: 800;
    font-size: 20px;
  }

  .footer-highlight {
    margin-top: 8px;
    margin-bottom: 32px;
    font-size: 15px;
    color: var(--cream);
    text-align: center;
    line-height: 1.75;
  }

  .footer-highlight .highlight {
    font-family: 'Noto Serif KR', serif;
    color: var(--gold-light);
    font-weight: 600;
  }

  #introDynamicText.setup-notice {
    color: var(--gold-light);
    font-weight: 700;
  }

  .field-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field-row input {
    flex: 1;
    min-width: 0;
  }

  .field-row button {
    width: auto;
    white-space: nowrap;
    padding: 0 22px;
    margin-top: 0;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 13px 14px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 3px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  input::placeholder { color: rgba(246,243,236,0.55); font-size: 12px; }

  input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(255,255,255,0.06);
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: var(--gold);
    color: var(--navy-deep);
    border: none;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    letter-spacing: 0.02em;
  }

  button:hover:not(:disabled) { background: var(--gold-light); }
  button:active:not(:disabled) { transform: scale(0.99); }

  button:disabled {
    background: rgba(255,255,255,0.08);
    color: rgba(246,243,236,0.4);
    cursor: not-allowed;
    box-shadow: none;
  }

  .message {
    margin-top: 8px;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
    min-height: 0;
  }

  .message.error { color: var(--error); }

  /* ===== 열람 화면 ===== */
  .viewer {
    display: none;
    width: 100%;
    max-width: 960px;
    height: 100dvh;
    max-height: 900px;
    flex-direction: column;
    background: var(--cream);
    border-radius: 4px;
    overflow: hidden;
  }

  /* 시트 "권한" 열이 차단인 경우: 복사/드래그 선택 방지 및 인쇄 시 안내문만 표시 */
  .viewer.protected .md-content {
    user-select: none;
    -webkit-user-select: none;
  }

  @media print {
    .viewer.protected .md-content {
      display: none;
    }
    .viewer.protected .viewer-frame-wrap::after {
      content: '이 문서는 인쇄가 제한되어 있습니다. NETAX 자문용역보고서';
      display: block;
      padding: 60px;
      font-size: 16px;
      text-align: center;
      color: #333;
    }
  }

  .viewer-header {
    background: var(--navy);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .viewer-header .greeting {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    color: var(--cream);
  }

  .viewer-header .greeting span { color: var(--gold-light); }

  .expiry-logo {
    height: 16px;
    opacity: 0.9;
  }

  .viewer-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #fullscreenBtn {
    width: auto;
    padding: 6px 12px;
    margin-top: 0;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    color: var(--cream);
    font-weight: 500;
  }

  #fullscreenBtn:hover { background: rgba(255,255,255,0.18); }

  /* 폰 화면: 헤더에서 인사말만 숨기고, 로고와 버튼은 유지 */
  @media (max-width: 480px), (max-height: 500px) {
    .viewer-header {
      padding: 6px 14px;
      justify-content: space-between;
    }
    .viewer-header .greeting {
      display: none;
    }
    .expiry-logo {
      height: 14px;
    }
    #fullscreenBtn {
      padding: 3px 10px;
      font-size: 16px;
      line-height: 1.2;
    }
    #fullscreenBtn .btn-label {
      display: none;
    }
    .viewer-header-right {
      gap: 10px;
      flex: 1;
      justify-content: space-between;
    }

    #fullscreenBtn {
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.22);
    }

    /* 보고서 본문: 표/제목이 좁은 화면에서도 형태를 유지하도록 글씨 축소 */
    .md-content {
      padding: 20px 14px 60px;
      font-size: 13px;
      line-height: 1.55;
    }
    .md-content h1 { font-size: 18px; padding-bottom: 10px; }
    .md-content h2 { font-size: 15px; padding: 8px 10px; margin: 26px 0 10px; }
    .md-content h3 { font-size: 13.5px; }
    .compare-label, .compare-value { width: 64px; font-size: 11.5px; }
  }

  .viewer-frame-wrap {
    flex: 1;
    background: #fff;
    overflow-y: auto;
  }

  .md-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 32px 80px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #22303F;
    line-height: 1.8;
    font-size: 15.5px;
    overflow-wrap: break-word;
    word-break: keep-all;
  }

  .md-content h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    text-align: left;
    letter-spacing: normal;
    margin: 0 0 8px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--gold);
    max-width: 100%;
    overflow-wrap: break-word;
    word-break: keep-all;
  }

  .md-content h1::after { display: none; }

  .md-content h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--navy);
    margin: 34px 0 12px;
    padding: 10px 14px;
    background: linear-gradient(90deg, rgba(200,162,68,0.22), rgba(200,162,68,0.04));
    border-left: 4px solid var(--gold);
    border-bottom: 2px solid var(--gold);
  }

  .md-content h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin: 24px 0 10px;
  }

  .md-content p { margin: 0 0 14px; }

  .md-content strong {
    color: var(--navy);
    background: linear-gradient(transparent 60%, rgba(200,162,68,0.28) 60%);
    font-weight: 700;
  }

  .md-content ul, .md-content ol {
    margin: 0 0 14px;
    padding-left: 22px;
  }

  .md-content ul { list-style: none; }
  .md-content ul li { position: relative; }
  .md-content ul li::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 9px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
  }

  .md-content ol { list-style: decimal; }
  .md-content ol li::marker { color: var(--gold); font-weight: 700; }

  .md-content li { margin-bottom: 6px; }

  .md-content li > ul,
  .md-content li > ol {
    margin-top: 6px;
    margin-bottom: 0;
  }

  .md-content .table-scroll {
    position: relative;
    overflow-x: auto;
    margin: 8px 0 24px;
  }

  /* 스크롤 힌트: 스크롤바가 위치하는 하단 모서리에 배치, 스크롤 위치에 따라 좌/우 독립적으로 표시 */
  .md-content .table-scroll.scrollable::after,
  .md-content .table-scroll.scrollable::before {
    position: absolute;
    bottom: 3px;
    color: rgba(200, 162, 68, 0.6);
    font-size: 13px;
    pointer-events: none;
    text-shadow: -1px 0 3px rgba(255,255,255,0.9), 1px 0 3px rgba(255,255,255,0.9);
    transition: opacity 0.15s ease;
    opacity: 0;
  }
  .md-content .table-scroll.scrollable::after { content: '▸'; right: 3px; }
  .md-content .table-scroll.scrollable::before { content: '◂'; left: 3px; }
  .md-content .table-scroll.scrollable.show-right::after { opacity: 1; }
  .md-content .table-scroll.scrollable.show-left::before { opacity: 1; }

  .md-content table {
    width: max-content;
    max-width: none;
    border-collapse: collapse;
    margin: 0;
    font-size: 14px;
  }

  .md-content th {
    background: #4A6080;
    color: #F5F2EC;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
  }

  .md-content td {
    padding: 9px 12px;
    border-bottom: 1px solid #E4E0D8;
  }

  .md-content tr:nth-child(even) td { background: #FAF8F3; }

  /* 10번: 체크/X 이모지 열은 중앙정렬 텍스트로만 — 이미지 글머리 남발 방지 */
  .md-content td:only-child,
  .md-content th:only-child { text-align: center; }

  .md-content blockquote {
    margin: 0 0 8px;
    padding: 12px 16px;
    background: #F5F1E8;
    color: #4A4A4A;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  /* 7번: 화살표(→) 앞에서 줄넘김 허용 */
  /* blockquote 안 p의 기본 하단 마진(14px) 제거 — padding과 중복되어 박스가 불필요하게 커지는 문제 방지 */
  .md-content blockquote p {
    white-space: normal;
    margin: 0;
  }

  /* 5·6번: hanging indent 제거 — 줄넘김은 항목 앞에서 자연스럽게 */
  .md-content p { text-indent: 0; padding-left: 0; }
  .md-content td { text-indent: 0; padding-left: 12px; }

  /* 금액 열 정렬: 추후 별도 지시에 따라 적용 */

  /* 붙임 발췌 이미지(그림1~3 등) — 컨테이너 폭에 맞춰 반응형으로 축소·중앙정렬.
     기존에 이 규칙이 없어 이미지가 원본 픽셀 크기 그대로 좌측에 작게 표시되던 문제 수정 */
  .md-content img {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 4px auto 6px;
    border: 1px solid #E4E0D8;
    border-radius: 4px;
  }

  /* 그림/표 캡션 및 단위 표기 — 본문과 구분되는 보조 텍스트 스타일 */
  .md-content .caption {
    text-align: center;
    font-size: 13px;
    color: #8A7B5C;
    margin: 18px 0 6px;
    font-weight: 600;
  }
  .md-content .unit-note {
    text-align: right;
    font-size: 12.5px;
    color: #8A8A8A;
    margin: 0 0 4px;
  }

  /* ===== KaTeX 수식 — 모바일 화면 너비 초과 시 가로 스크롤 처리 ===== */
  .md-content .katex-display {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 2px 8px;
    margin: 8px 0 16px;
    max-width: 100%;
  }
  .md-content .katex {
    font-size: 1em;
  }
  @media (max-width: 480px) {
    .md-content .katex-display {
      font-size: 0.85em;
    }
    .md-content .katex-display > .katex {
      white-space: normal;
    }
    /* 모바일 본문 행간·폰트 축소 — 넓은 행간으로 인한 스크롤 과다 방지 */
    .md-content {
      font-size: 14.5px;
      line-height: 1.55;
    }
    .md-content p,
    .md-content li,
    .md-content td,
    .md-content blockquote {
      line-height: 1.5;
    }
    .md-content h2 {
      line-height: 1.4;
    }
  }

  /* ===== Chart.js 차트 ===== */
  .chart-wrapper {
    margin: 12px 0 24px;
    background: #FAFAF7;
    border: 1px solid #E4E0D8;
    border-radius: 8px;
    padding: 20px;
  }
  .chart-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 14px;
    text-align: center;
  }

  /* ===== 타임라인 ===== */
  .timeline-chart {
    margin: 12px 0 24px;
    padding: 8px 0;
    position: relative;
  }
  .timeline-chart::before {
    content: '';
    position: absolute;
    left: 90px;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    opacity: 0.4;
  }
  .timeline-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
    position: relative;
  }
  .timeline-dot {
    position: absolute;
    left: 84px;
    top: 4px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--navy);
    flex-shrink: 0;
  }
  .timeline-date {
    width: 78px;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    text-align: right;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .timeline-label {
    margin-left: 20px;
    font-size: 13px;
    color: #3A3A3A;
    line-height: 1.6;
  }

  /* 9번: blockquote 내 p 태그 앞 이모지 글머리 제거 — 이모지는 텍스트 그 자체로만 */
  .md-content blockquote p { padding-left: 0; text-indent: 0; }

  /* ===== 목차 ===== */
  .toc {
    background: #F5F1E8;
    border: 1px solid rgba(200,162,68,0.35);
    border-radius: 8px;
    padding: 18px 22px;
    margin: 0 0 28px;
  }
  .toc-title {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    color: var(--navy);
    font-size: 14px;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .toc ul {
    list-style: none;
    margin: 0;
    padding-left: 4px;
  }
  .toc ul li::before { content: none; }
  .toc li { margin-bottom: 4px; }
  .toc a {
    color: #2A3F63;
    text-decoration: none;
    font-size: 13.5px;
  }
  .toc a:hover { text-decoration: underline; color: var(--navy); }

  /* ===== 알림 상자 색상 구분 ===== */
  .md-content blockquote.callout-success {
    background: #EAF7EE;
    border: 1px solid #8FCB9F;
  }
  .md-content blockquote.callout-warning {
    background: #FFF6E0;
    border: 1px solid #E8C363;
  }
  .md-content blockquote.callout-danger {
    background: #FCEBEB;
    border: 1px solid #E29B9B;
  }
  .md-content blockquote.callout-info {
    background: #E9F1FA;
    border: 1px solid #9CC1E8;
  }

  /* ===== 숫자 비교 막대그래프 ===== */
  .compare-chart {
    margin: 8px 0 24px;
    padding: 18px 20px;
    background: #FAF8F3;
    border-radius: 6px;
  }
  .compare-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .compare-row:last-child { margin-bottom: 0; }
  .compare-label {
    width: 90px;
    flex-shrink: 0;
    font-size: 13px;
    color: #444;
  }
  .compare-track {
    flex: 1;
    background: #E4E0D8;
    border-radius: 4px;
    height: 18px;
    overflow: hidden;
  }
  .compare-fill {
    height: 100%;
    background: linear-gradient(90deg, #2A3F63, #0D1B3D);
    border-radius: 4px;
  }
  .compare-value {
    width: 90px;
    flex-shrink: 0;
    text-align: right;
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
  }

  /* ===== 접고 펼치기 (details/summary) ===== */
  .md-content details {
    margin: 0 0 8px;
    border: 1px solid #E4E0D8;
    border-radius: 6px;
    overflow: hidden;
  }
  .md-content summary {
    cursor: pointer;
    padding: 12px 16px;
    background: #F5F1E8;
    font-weight: 700;
    color: var(--navy);
    list-style: none;
    word-break: keep-all;
    transition: background 0.15s ease;
  }
  .md-content summary:hover {
    background: #EFE8D8;
  }
  /* 11번: 콜론 앞 스페이스 — summary 내 em dash나 콜론 앞 여백 자연스럽게 */
  .md-content summary::after {
    content: '';
  }
  .md-content summary::-webkit-details-marker { display: none; }
  .md-content summary::before {
    content: '▶';
    display: inline-block;
    margin-right: 8px;
    font-size: 11px;
    color: var(--gold);
    transition: transform 0.2s ease;
    transform: rotate(0deg);
  }
  .md-content details[open] summary::before {
    transform: rotate(90deg);
  }
  .md-content details > *:not(summary) {
    padding: 0 16px;
  }
  .md-content details p:last-child {
    padding-bottom: 16px;
  }

  .mermaid-diagram {
    margin: 16px 0 24px;
    padding: 16px;
    background: #FAF8F3;
    border-radius: 6px;
    overflow-x: auto;
    text-align: center;
  }

  .mermaid-diagram svg {
    max-width: 100%;
    min-width: min(420px, 100%);
    height: auto;
    display: block;
    margin: 0 auto;
  }

  /* Mermaid 노드 내부 텍스트 행간·크기 축소 — 박스 밖으로 삐져나오는 문제 방지 */
  .mermaid-diagram svg .nodeLabel,
  .mermaid-diagram svg .edgeLabel,
  .mermaid-diagram svg foreignObject div,
  .mermaid-diagram svg foreignObject span {
    font-size: 12.5px !important;
    line-height: 1.25 !important;
  }
  .mermaid-diagram svg .label {
    font-size: 12.5px !important;
  }

  .md-content hr {
    border: none;
    border-top: 1px solid #E4E0D8;
    margin: 28px 0;
  }

  .viewer-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .footer-brand {
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .footer-logo {
    height: 16px;
    opacity: 0.85;
    flex-shrink: 0;
  }

  .footer-divider {
    width: 1px;
    align-self: stretch;
    background: rgba(255,255,255,0.12);
  }

  .footer-brand-text {
    font-size: 13px;
    color: var(--cream);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  @media (max-width: 1024px), (max-height: 1024px) {
    body { padding: 0; align-items: stretch; }
    .card {
      max-width: 100%;
      min-height: 100dvh;
      border-radius: 0;
      border-left: none;
      border-right: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px 24px 16px;
    }
    .card::before, .card::after { border-radius: 0; }
    #loginCard h1 { font-size: 21px; }

    .viewer {
      max-width: 100%;
      max-height: none;
      height: 100dvh;
      border-radius: 0;
    }
  }
  .statute-link {
    color: var(--navy);
    background: rgba(200,162,68,0.16);
    border-bottom: 1px solid var(--gold);
    padding: 0 2px;
    cursor: pointer;
    white-space: nowrap;
  }
  .statute-link:hover { background: rgba(200,162,68,0.32); }

  .statute-modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(13,27,61,0.55);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .statute-modal-box {
    background: #FFFDF8;
    border-top: 4px solid var(--gold);
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px 22px 20px;
    position: relative;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .statute-modal-title {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    font-size: 14.5px;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .statute-modal-body {
    font-size: 13.5px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 16px;
  }
  .statute-modal-link {
    display: inline-block;
    font-size: 12.5px;
    color: var(--navy);
    text-decoration: none;
    border-bottom: 1px solid var(--gold);
  }
  .statute-modal-link:hover { color: var(--gold-light); }
  .statute-modal-hint {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-size: 11px;
    color: #999;
    text-align: center;
  }
</style>
</head>
<body>

  <!-- 로그인 카드 -->
  <div class="card" id="loginCard">
    <h1>Consulting Report</h1>

    <p class="footer-highlight">이 <span class="highlight-strong">자문용역 보고서</span> 는<br>고객님을 위해 <span class="highlight">맞춤형</span>으로<br>종이문서가 아닌 <span class="highlight">전용 페이지</span>로<br>특별히 제작하여<br>드리는 문서입니다.<br>스마트기기로 언제 어디서든<br>열람하실 수 있습니다.<br><span id="introDynamicText">열람가능 기간은<br>발급일로부터 30일입니다.</span></p>

    <form id="idForm">
      <div class="field-row">
        <input type="text" id="reportId" placeholder="예: 7K4M" aria-label="열람번호" autocomplete="off" maxlength="4" style="text-transform:uppercase;" required>
        <button type="submit" id="idSubmitBtn">확인</button>
      </div>
    </form>

    <form id="passwordForm" style="display:none;">
      <div class="field-row" id="passwordRow">
        <input type="password" id="password" placeholder="비밀번호" aria-label="비밀번호" autocomplete="off" required>
        <button type="submit" id="submitBtn">열람하기</button>
      </div>
    </form>

    <div class="message" id="message"></div>

    <div class="footer-brand">
      <img src="netax-wordmark.png" alt="NETAX" class="footer-logo">
      <div class="footer-divider"></div>
      <div class="footer-brand-text">이음세무컨설팅<br>조종호 세무사</div>
    </div>
  </div>

  <!-- 열람 화면 -->
  <div class="viewer" id="viewer">
    <div class="viewer-header" id="viewerHeader">
      <div class="greeting"><span id="customerName"></span> 고객님, 자문용역보고서</div>
      <div class="viewer-header-right">
        <img src="netax-wordmark.png" alt="NETAX" class="expiry-logo">
        <button type="button" id="fullscreenBtn" title="전체화면으로 보기">⤢ <span class="btn-label">전체화면</span></button>
      </div>
    </div>
    <div class="viewer-frame-wrap">
      <iframe id="materialFrame" title="자문보고서" style="display:none;"></iframe>
      <div id="materialContent" class="md-content" style="display:none;"></div>
    </div>
  </div>

<script>
  // ===== 설정 =====
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyg0gDbzPPkpZs2Gnsuw7Qh_qszYy1_8f2Q-SN7Ffreoc3GfHzIZ7B5UXNidT5ale_b/exec';

  // URL에 ?report_id=7K4M 형태로 넘어오면 자동 채움
  const urlParams = new URLSearchParams(window.location.search);
  const prefilledId = urlParams.get('report_id') ? formatReportId(urlParams.get('report_id')).toUpperCase() : '';
  const adminCodeParam = urlParams.get('admin');
  if (prefilledId) document.getElementById('reportId').value = prefilledId;

  async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function toEmbedUrl(link) {
    // 구글 드라이브/문서/슬라이드 링크는 /preview 형태여야 iframe 임베드가 잘 됩니다.
    if (link.includes('/edit')) return link.replace(/\/edit.*$/, '/preview');
    if (link.includes('/view')) return link.replace(/\/view.*$/, '/preview');
    return link;
  }

  const idForm = document.getElementById('idForm');
  const idSubmitBtn = document.getElementById('idSubmitBtn');
  const passwordForm = document.getElementById('passwordForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageEl = document.getElementById('message');
  const passwordInput = document.getElementById('password');
  const introDynamicText = document.getElementById('introDynamicText');

  let currentReportId = '';

  async function callBackend(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  function showResult(data) {
    document.getElementById('customerName').textContent = data.customer_name;
    const frame = document.getElementById('materialFrame');
    const contentEl = document.getElementById('materialContent');
    const viewerEl = document.getElementById('viewer');

    // 권한 "차단"이면 인쇄/복사/드래그 선택 방지
    if (data.download_allowed === false) {
      viewerEl.classList.add('protected');
    } else {
      viewerEl.classList.remove('protected');
    }

    if (data.report_html) {
      // 2026.07~: 보고서작성시스템(desk.netax.kr/report-writer)에서 렌더링까지 끝낸
      // 완성본 HTML을 그대로 받아 iframe에 표시만 한다. rpt 쪽에는 렌더링 로직이 없다.
      contentEl.style.display = 'none';
      frame.style.display = 'block';
      frame.removeAttribute('src');
      frame.srcdoc = data.report_html;
    } else if (data.report_content) {
      // ⚠ 레거시 경로: 백엔드가 아직 완성본 HTML이 아니라 마크다운 원문을 내려주는
      // (구 등록 방식으로 남아있는) 보고서용. 이 페이지에는 더 이상 marked/mermaid/
      // KaTeX/Chart.js/Prism이 로드되어 있지 않으므로 서식 없이 원문 그대로만 보여준다.
      // admin.netax.kr에서 report-writer 완성본(HTML)으로 재등록하면 위 report_html
      // 경로로 정상 전환된다.
      frame.style.display = 'none';
      contentEl.style.display = 'block';
      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap; word-break:break-word; font-family:inherit;';
      pre.textContent = data.report_content;
      contentEl.innerHTML = '';
      contentEl.appendChild(pre);
    } else {
      // 기존 방식: 구글 드라이브 파일을 iframe으로 표시
      contentEl.style.display = 'none';
      frame.style.display = 'block';
      if (data.material_link.startsWith('srcdoc:')) {
        frame.removeAttribute('src');
        frame.srcdoc = data.material_link.slice(7);
      } else {
        frame.removeAttribute('srcdoc');
        frame.src = toEmbedUrl(data.material_link);
      }
    }

    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('viewer').style.display = 'flex';

    // 스크롤 위치를 맨 위로 강제 초기화 (이전 위치나 브라우저 자동 스크롤 보정으로
    // 중간부터 보이는 문제 방지).
    const frameWrap = document.querySelector('.viewer-frame-wrap');
    window.scrollTo(0, 0);
    if (frameWrap) frameWrap.scrollTop = 0;
    requestAnimationFrame(() => {
      window.scrollTo(0, 0);
      if (frameWrap) frameWrap.scrollTop = 0;
    });
    setTimeout(() => {
      window.scrollTo(0, 0);
      if (frameWrap) frameWrap.scrollTop = 0;
    }, 300);
  }

  document.getElementById('materialContent').addEventListener('contextmenu', (e) => {
    if (document.getElementById('viewer').classList.contains('protected')) {
      e.preventDefault();
    }
  });

  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const viewer = document.getElementById('viewer');
    if (!document.fullscreenElement) {
      (viewer.requestFullscreen || viewer.webkitRequestFullscreen)?.call(viewer);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    }
  });

  // 전체화면 상태에 따라 버튼 아이콘·라벨 전환 (ESC로 빠져나가는 경우도 정확히 반영됨)
  function updateFullscreenBtnLabel() {
    const btn = document.getElementById('fullscreenBtn');
    const isFullscreen = !!document.fullscreenElement;
    btn.innerHTML = isFullscreen
      ? '⤡ <span class="btn-label">기본보기</span>'
      : '⤢ <span class="btn-label">전체화면</span>';
    btn.title = isFullscreen ? '기본 화면으로 보기' : '전체화면으로 보기';
  }
  document.addEventListener('fullscreenchange', updateFullscreenBtnLabel);
  document.addEventListener('webkitfullscreenchange', updateFullscreenBtnLabel);

  // ===== 관리자 우회: ?report_id=7K4M&admin=관리자코드 로 접속하면 자동 진입 =====
  if (prefilledId && adminCodeParam) {
    // 응답을 기다리지 않고 즉시 로그인 화면을 가려서, 확인 버튼이 보이는 순간 자체를 없앤다
    document.getElementById('loginCard').style.display = 'none';
    callBackend({ report_id: prefilledId, admin_code: adminCodeParam }).then(data => {
      if (data.success) {
        showResult(data);
      } else {
        // 실패 시에만 다시 로그인 화면을 보여줌
        document.getElementById('loginCard').style.display = 'block';
        messageEl.textContent = data.message || '관리자 우회 실패';
        messageEl.className = 'message error';
      }
    });
  }

  // ===== 한글 자판으로 잘못 입력된 열람번호를 영문으로 역변환 =====
  // 두벌식 자판 기준: 한글 입력 시 눌렸던 실제 키(영문)를 복원
  const HANGUL_TO_QWERTY = {
    'ㅂ':'q','ㅈ':'w','ㄷ':'e','ㄱ':'r','ㅅ':'t','ㅛ':'y','ㅕ':'u','ㅑ':'i','ㅐ':'o','ㅔ':'p',
    'ㅁ':'a','ㄴ':'s','ㅇ':'d','ㄹ':'f','ㅎ':'g','ㅗ':'h','ㅓ':'j','ㅏ':'k','ㅣ':'l',
    'ㅋ':'z','ㅌ':'x','ㅊ':'c','ㅍ':'v','ㅠ':'b','ㅜ':'n','ㅡ':'m',
    'ㅃ':'Q','ㅉ':'W','ㄸ':'E','ㄲ':'R','ㅆ':'T','ㅒ':'O','ㅖ':'P',
  };

  function decomposeHangul(ch) {
    const code = ch.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) return null; // 완성형 한글 범위 밖
    const CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
    const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    const idx = code - 0xAC00;
    const cho  = CHO[Math.floor(idx / (21 * 28))];
    const jung = JUNG[Math.floor((idx % (21 * 28)) / 28)];
    const jong = JONG[idx % 28];
    return { cho, jung, jong };
  }

  // 열람번호는 영문·숫자 조합이 원칙이므로, 완성형 한글이 섞여 있으면
  // 두벌식 자판 매핑으로 되돌려 원래 눌렀을 영문 키 조합으로 복원한다.
  function normalizeReportId(raw) {
    let result = '';
    for (const ch of raw) {
      // 조합되지 않은 낱자(자음/모음)가 그대로 들어온 경우 — 바로 매핑
      if (HANGUL_TO_QWERTY[ch]) {
        result += HANGUL_TO_QWERTY[ch];
        continue;
      }
      // 완성형 한글(가~힣)인 경우 — 초성·중성·종성으로 분해 후 매핑
      const parts = decomposeHangul(ch);
      if (!parts) {
        result += ch; // 이미 영문/숫자면 그대로
        continue;
      }
      if (HANGUL_TO_QWERTY[parts.cho]) result += HANGUL_TO_QWERTY[parts.cho];
      if (HANGUL_TO_QWERTY[parts.jung]) result += HANGUL_TO_QWERTY[parts.jung];
      if (parts.jong && HANGUL_TO_QWERTY[parts.jong]) result += HANGUL_TO_QWERTY[parts.jong];
    }
    return result;
  }

  // 열람번호 형식 정리 — 영문·숫자만 남기고 4자로 제한
  function formatReportId(raw) {
    return raw.replace(/[^A-Za-z0-9]/g, '').slice(0, 4);
  }

  // 타이핑하는 동안 4자리마다 자동으로 하이픈 삽입 (XXXX-XXXX)
  document.getElementById('reportId').addEventListener('input', (e) => {
    const cursorAtEnd = e.target.selectionEnd === e.target.value.length;
    e.target.value = formatReportId(e.target.value);
    if (cursorAtEnd) e.target.setSelectionRange(e.target.value.length, e.target.value.length);
  });

  // ===== 1단계: 열람번호 확인 =====
  idForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rawInput = document.getElementById('reportId').value.trim();
    const reportId = formatReportId(normalizeReportId(rawInput)).toUpperCase();
    if (!reportId) return;

    idSubmitBtn.disabled = true;
    idSubmitBtn.textContent = '확인 중...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const data = await callBackend({ report_id: reportId });

      if (data.needs_setup) {
        // 최초 접속 -> 비밀번호 설정 (같은 화면, placeholder와 안내문구 자리의 텍스트만 교체)
        currentReportId = reportId;
        passwordInput.placeholder = '비밀번호 설정';
        introDynamicText.innerHTML = '지금 설정하시는 비밀번호로<br>계속 접속하시면 됩니다.';
        introDynamicText.classList.add('setup-notice');
        idForm.style.display = 'none';
        passwordForm.style.display = 'block';
      } else if (data.needs_login) {
        // 이미 비밀번호 설정됨 -> 로그인 화면
        currentReportId = reportId;
        passwordInput.placeholder = '비밀번호 입력';
        introDynamicText.innerHTML = '열람가능 기간은<br>발급일로부터 30일입니다.';
        introDynamicText.classList.remove('setup-notice');
        idForm.style.display = 'none';
        passwordForm.style.display = 'block';
      } else if (data.success) {
        // 관리자 우회 등으로 비밀번호 없이 바로 통과되는 경우
        showResult(data);
      } else {
        messageEl.textContent = data.message || '확인할 수 없습니다.';
        messageEl.className = 'message error';
      }
    } catch (err) {
      messageEl.textContent = '연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
      messageEl.className = 'message error';
    } finally {
      idSubmitBtn.disabled = false;
      idSubmitBtn.textContent = '확인';
    }
  });

  // ===== 2단계: 비밀번호 설정 또는 로그인 =====
  passwordForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = '확인 중...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const passwordHash = await sha256(password);
      const data = await callBackend({ report_id: currentReportId, password_hash: passwordHash });

      if (data.success) {
        showResult(data);
      } else {
        messageEl.textContent = data.message || '열람에 실패했습니다.';
        messageEl.className = 'message error';
      }
    } catch (err) {
      messageEl.textContent = '연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
      messageEl.className = 'message error';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '열람하기';
    }
  });
</script>

</body>
