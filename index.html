<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>자문보고서 열람 | NETAX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js"></script>
<!-- KaTeX: 수식 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<!-- Chart.js: 원형·꺾은선·막대 차트 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Prism.js: 코드 하이라이팅 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<style>
  :root {
    --navy: #0D1B3D;
    --navy-deep: #081226;
    --cream: #F8F6F0;
    --gold: #C8A244;
    --gold-light: #DCC17E;
    --error: #B14545;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy-deep);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(176,141,87,0.08), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(176,141,87,0.06), transparent 45%);
    color: var(--cream);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--navy);
    border: 1px solid rgba(176,141,87,0.25);
    border-radius: 4px;
    padding: 48px 36px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
    border-radius: 4px 4px 0 0;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
    border-radius: 0 0 4px 4px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 27px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 22px;
    color: var(--cream);
  }

  h1::after {
    content: '';
    display: block;
    width: 48px;
    height: 2px;
    background: var(--gold);
    margin: 22px auto 0;
  }

  .footer-highlight .highlight-strong {
    font-family: 'Nanum Myeongjo', serif;
    color: var(--gold-light);
    font-weight: 800;
    font-size: 20px;
  }

  .footer-highlight {
    margin-top: 8px;
    margin-bottom: 32px;
    font-size: 15px;
    color: var(--cream);
    text-align: center;
    line-height: 1.75;
  }

  .footer-highlight .highlight {
    font-family: 'Noto Serif KR', serif;
    color: var(--gold-light);
    font-weight: 600;
  }

  #introDynamicText.setup-notice {
    color: var(--gold-light);
    font-weight: 700;
  }

  .field-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field-row input {
    flex: 1;
    min-width: 0;
  }

  .field-row button {
    width: auto;
    white-space: nowrap;
    padding: 0 22px;
    margin-top: 0;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 13px 14px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 3px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  input::placeholder { color: rgba(246,243,236,0.55); font-size: 12px; }

  input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(255,255,255,0.06);
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: var(--gold);
    color: var(--navy-deep);
    border: none;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    letter-spacing: 0.02em;
  }

  button:hover:not(:disabled) { background: var(--gold-light); }
  button:active:not(:disabled) { transform: scale(0.99); }

  button:disabled {
    background: rgba(255,255,255,0.08);
    color: rgba(246,243,236,0.4);
    cursor: not-allowed;
    box-shadow: none;
  }

  .message {
    margin-top: 8px;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
    min-height: 0;
  }

  .message.error { color: var(--error); }

  /* ===== 열람 화면 ===== */
  .viewer {
    display: none;
    width: 100%;
    max-width: 960px;
    height: 100dvh;
    max-height: 900px;
    flex-direction: column;
    background: var(--cream);
    border-radius: 4px;
    overflow: hidden;
  }

  /* 시트 "권한" 열이 차단인 경우: 복사/드래그 선택 방지 및 인쇄 시 안내문만 표시 */
  .viewer.protected .md-content {
    user-select: none;
    -webkit-user-select: none;
  }

  @media print {
    .viewer.protected .md-content {
      display: none;
    }
    .viewer.protected .viewer-frame-wrap::after {
      content: '이 문서는 인쇄가 제한되어 있습니다. NETAX 자문용역보고서';
      display: block;
      padding: 60px;
      font-size: 16px;
      text-align: center;
      color: #333;
    }
  }

  .viewer-header {
    background: var(--navy);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .viewer-header .greeting {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    color: var(--cream);
  }

  .viewer-header .greeting span { color: var(--gold-light); }

  .expiry-logo {
    height: 16px;
    opacity: 0.9;
  }

  .viewer-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #fullscreenBtn {
    width: auto;
    padding: 6px 12px;
    margin-top: 0;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    color: var(--cream);
    font-weight: 500;
  }

  #fullscreenBtn:hover { background: rgba(255,255,255,0.18); }

  /* 폰 화면: 헤더에서 인사말만 숨기고, 로고와 버튼은 유지 */
  @media (max-width: 480px), (max-height: 500px) {
    .viewer-header {
      padding: 6px 14px;
      justify-content: space-between;
    }
    .viewer-header .greeting {
      display: none;
    }
    .expiry-logo {
      height: 14px;
    }
    #fullscreenBtn {
      padding: 3px 10px;
      font-size: 16px;
      line-height: 1.2;
    }
    #fullscreenBtn .btn-label {
      display: none;
    }
    .viewer-header-right {
      gap: 10px;
      flex: 1;
      justify-content: space-between;
    }

    #fullscreenBtn {
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.22);
    }

    /* 보고서 본문: 표/제목이 좁은 화면에서도 형태를 유지하도록 글씨 축소 */
    .md-content {
      padding: 20px 14px 60px;
      font-size: 13px;
      line-height: 1.55;
    }
    .md-content h1 { font-size: 18px; padding-bottom: 10px; }
    .md-content h2 { font-size: 15px; padding: 8px 10px; margin: 26px 0 10px; }
    .md-content h3 { font-size: 13.5px; }
    .compare-label, .compare-value { width: 64px; font-size: 11.5px; }
  }

  .viewer-frame-wrap {
    flex: 1;
    background: #fff;
    overflow-y: auto;
  }

  .md-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 32px 80px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #22303F;
    line-height: 1.8;
    font-size: 15.5px;
    overflow-wrap: break-word;
    word-break: keep-all;
  }

  .md-content h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    text-align: left;
    letter-spacing: normal;
    margin: 0 0 8px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--gold);
    max-width: 100%;
    overflow-wrap: break-word;
    word-break: keep-all;
  }

  .md-content h1::after { display: none; }

  .md-content h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--navy);
    margin: 34px 0 12px;
    padding: 10px 14px;
    background: linear-gradient(90deg, rgba(200,162,68,0.22), rgba(200,162,68,0.04));
    border-left: 4px solid var(--gold);
    border-bottom: 2px solid var(--gold);
  }

  .md-content h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin: 24px 0 10px;
  }

  .md-content p { margin: 0 0 14px; }

  .md-content strong {
    color: var(--navy);
    background: linear-gradient(transparent 60%, rgba(200,162,68,0.28) 60%);
    font-weight: 700;
  }

  .md-content ul, .md-content ol {
    margin: 0 0 14px;
    padding-left: 22px;
  }

  .md-content ul { list-style: none; }
  .md-content ul li { position: relative; }
  .md-content ul li::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 9px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
  }

  .md-content ol { list-style: decimal; }
  .md-content ol li::marker { color: var(--gold); font-weight: 700; }

  .md-content li { margin-bottom: 6px; }

  .md-content li > ul,
  .md-content li > ol {
    margin-top: 6px;
    margin-bottom: 0;
  }

  .md-content .table-scroll {
    position: relative;
    overflow-x: auto;
    margin: 8px 0 24px;
  }

  /* 스크롤 힌트: 스크롤바가 위치하는 하단 모서리에 배치, 스크롤 위치에 따라 좌/우 독립적으로 표시 */
  .md-content .table-scroll.scrollable::after,
  .md-content .table-scroll.scrollable::before {
    position: absolute;
    bottom: 3px;
    color: rgba(200, 162, 68, 0.6);
    font-size: 13px;
    pointer-events: none;
    text-shadow: -1px 0 3px rgba(255,255,255,0.9), 1px 0 3px rgba(255,255,255,0.9);
    transition: opacity 0.15s ease;
    opacity: 0;
  }
  .md-content .table-scroll.scrollable::after { content: '▸'; right: 3px; }
  .md-content .table-scroll.scrollable::before { content: '◂'; left: 3px; }
  .md-content .table-scroll.scrollable.show-right::after { opacity: 1; }
  .md-content .table-scroll.scrollable.show-left::before { opacity: 1; }

  .md-content table {
    width: max-content;
    max-width: none;
    border-collapse: collapse;
    margin: 0;
    font-size: 14px;
  }

  .md-content th {
    background: #4A6080;
    color: #F5F2EC;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
  }

  .md-content td {
    padding: 9px 12px;
    border-bottom: 1px solid #E4E0D8;
  }

  .md-content tr:nth-child(even) td { background: #FAF8F3; }

  /* 10번: 체크/X 이모지 열은 중앙정렬 텍스트로만 — 이미지 글머리 남발 방지 */
  .md-content td:only-child,
  .md-content th:only-child { text-align: center; }

  .md-content blockquote {
    margin: 0 0 8px;
    padding: 12px 16px;
    background: #F5F1E8;
    color: #4A4A4A;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  /* 7번: 화살표(→) 앞에서 줄넘김 허용 */
  /* blockquote 안 p의 기본 하단 마진(14px) 제거 — padding과 중복되어 박스가 불필요하게 커지는 문제 방지 */
  .md-content blockquote p {
    white-space: normal;
    margin: 0;
  }

  /* 5·6번: hanging indent 제거 — 줄넘김은 항목 앞에서 자연스럽게 */
  .md-content p { text-indent: 0; padding-left: 0; }
  .md-content td { text-indent: 0; padding-left: 12px; }

  /* 금액 열 정렬: 추후 별도 지시에 따라 적용 */

  /* ===== KaTeX 수식 — 모바일 화면 너비 초과 시 가로 스크롤 처리 ===== */
  .md-content .katex-display {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 2px 8px;
    margin: 8px 0 16px;
    max-width: 100%;
  }
  .md-content .katex {
    font-size: 1em;
  }
  @media (max-width: 480px) {
    .md-content .katex-display {
      font-size: 0.85em;
    }
    .md-content .katex-display > .katex {
      white-space: normal;
    }
    /* 모바일 본문 행간·폰트 축소 — 넓은 행간으로 인한 스크롤 과다 방지 */
    .md-content {
      font-size: 14.5px;
      line-height: 1.55;
    }
    .md-content p,
    .md-content li,
    .md-content td,
    .md-content blockquote {
      line-height: 1.5;
    }
    .md-content h2 {
      line-height: 1.4;
    }
  }

  /* ===== Chart.js 차트 ===== */
  .chart-wrapper {
    margin: 12px 0 24px;
    background: #FAFAF7;
    border: 1px solid #E4E0D8;
    border-radius: 8px;
    padding: 20px;
  }
  .chart-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 14px;
    text-align: center;
  }

  /* ===== 타임라인 ===== */
  .timeline-chart {
    margin: 12px 0 24px;
    padding: 8px 0;
    position: relative;
  }
  .timeline-chart::before {
    content: '';
    position: absolute;
    left: 90px;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    opacity: 0.4;
  }
  .timeline-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
    position: relative;
  }
  .timeline-dot {
    position: absolute;
    left: 84px;
    top: 4px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--navy);
    flex-shrink: 0;
  }
  .timeline-date {
    width: 78px;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    text-align: right;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .timeline-label {
    margin-left: 20px;
    font-size: 13px;
    color: #3A3A3A;
    line-height: 1.6;
  }

  /* 9번: blockquote 내 p 태그 앞 이모지 글머리 제거 — 이모지는 텍스트 그 자체로만 */
  .md-content blockquote p { padding-left: 0; text-indent: 0; }

  /* ===== 목차 ===== */
  .toc {
    background: #F5F1E8;
    border: 1px solid rgba(200,162,68,0.35);
    border-radius: 8px;
    padding: 18px 22px;
    margin: 0 0 28px;
  }
  .toc-title {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    color: var(--navy);
    font-size: 14px;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .toc ul {
    list-style: none;
    margin: 0;
    padding-left: 4px;
  }
  .toc ul li::before { content: none; }
  .toc li { margin-bottom: 4px; }
  .toc a {
    color: #2A3F63;
    text-decoration: none;
    font-size: 13.5px;
  }
  .toc a:hover { text-decoration: underline; color: var(--navy); }

  /* ===== 알림 상자 색상 구분 ===== */
  .md-content blockquote.callout-success {
    background: #EAF7EE;
    border: 1px solid #8FCB9F;
  }
  .md-content blockquote.callout-warning {
    background: #FFF6E0;
    border: 1px solid #E8C363;
  }
  .md-content blockquote.callout-danger {
    background: #FCEBEB;
    border: 1px solid #E29B9B;
  }
  .md-content blockquote.callout-info {
    background: #E9F1FA;
    border: 1px solid #9CC1E8;
  }

  /* ===== 숫자 비교 막대그래프 ===== */
  .compare-chart {
    margin: 8px 0 24px;
    padding: 18px 20px;
    background: #FAF8F3;
    border-radius: 6px;
  }
  .compare-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .compare-row:last-child { margin-bottom: 0; }
  .compare-label {
    width: 90px;
    flex-shrink: 0;
    font-size: 13px;
    color: #444;
  }
  .compare-track {
    flex: 1;
    background: #E4E0D8;
    border-radius: 4px;
    height: 18px;
    overflow: hidden;
  }
  .compare-fill {
    height: 100%;
    background: linear-gradient(90deg, #2A3F63, #0D1B3D);
    border-radius: 4px;
  }
  .compare-value {
    width: 90px;
    flex-shrink: 0;
    text-align: right;
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
  }

  /* ===== 접고 펼치기 (details/summary) ===== */
  .md-content details {
    margin: 0 0 8px;
    border: 1px solid #E4E0D8;
    border-radius: 6px;
    overflow: hidden;
  }
  .md-content summary {
    cursor: pointer;
    padding: 12px 16px;
    background: #F5F1E8;
    font-weight: 700;
    color: var(--navy);
    list-style: none;
    word-break: keep-all;
    transition: background 0.15s ease;
  }
  .md-content summary:hover {
    background: #EFE8D8;
  }
  /* 11번: 콜론 앞 스페이스 — summary 내 em dash나 콜론 앞 여백 자연스럽게 */
  .md-content summary::after {
    content: '';
  }
  .md-content summary::-webkit-details-marker { display: none; }
  .md-content summary::before {
    content: '▶';
    display: inline-block;
    margin-right: 8px;
    font-size: 11px;
    color: var(--gold);
    transition: transform 0.2s ease;
    transform: rotate(0deg);
  }
  .md-content details[open] summary::before {
    transform: rotate(90deg);
  }
  .md-content details > *:not(summary) {
    padding: 0 16px;
  }
  .md-content details p:last-child {
    padding-bottom: 16px;
  }

  .mermaid-diagram {
    margin: 16px 0 24px;
    padding: 16px;
    background: #FAF8F3;
    border-radius: 6px;
    overflow-x: auto;
    text-align: center;
  }

  .mermaid-diagram svg {
    max-width: 100%;
    min-width: min(420px, 100%);
    height: auto;
    display: block;
    margin: 0 auto;
  }

  /* Mermaid 노드 내부 텍스트 행간·크기 축소 — 박스 밖으로 삐져나오는 문제 방지 */
  .mermaid-diagram svg .nodeLabel,
  .mermaid-diagram svg .edgeLabel,
  .mermaid-diagram svg foreignObject div,

<script>
  // ===== 설정 =====
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyg0gDbzPPkpZs2Gnsuw7Qh_qszYy1_8f2Q-SN7Ffreoc3GfHzIZ7B5UXNidT5ale_b/exec';

  // URL에 ?report_id=7K4M 형태로 넘어오면 자동 채움
  const urlParams = new URLSearchParams(window.location.search);
  const prefilledId = urlParams.get('report_id') ? formatReportId(urlParams.get('report_id')).toUpperCase() : '';
  const adminCodeParam = urlParams.get('admin');
  if (prefilledId) document.getElementById('reportId').value = prefilledId;

  async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function toEmbedUrl(link) {
    // 구글 드라이브/문서/슬라이드 링크는 /preview 형태여야 iframe 임베드가 잘 됩니다.
    if (link.includes('/edit')) return link.replace(/\/edit.*$/, '/preview');
    if (link.includes('/view')) return link.replace(/\/view.*$/, '/preview');
    return link;
  }

  const idForm = document.getElementById('idForm');
  const idSubmitBtn = document.getElementById('idSubmitBtn');
  const passwordForm = document.getElementById('passwordForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageEl = document.getElementById('message');
  const passwordInput = document.getElementById('password');
  const introDynamicText = document.getElementById('introDynamicText');

  let currentReportId = '';

  async function callBackend(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  // ===== KaTeX 수식 렌더링 =====
  // 문법: 인라인 수식 $수식$, 블록 수식 $$수식$$
  function renderKatex(container) {
    if (!window.renderMathInElement) return;
    renderMathInElement(container, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$',  right: '$',  display: false },
      ],
      throwOnError: false,
      output: 'html',
    });
  }

  // ===== Chart.js 차트 렌더링 =====
  // 문법: ```chart
  // type: pie | line | bar | doughnut | radar
  // title: 차트 제목
  // labels: 항목1, 항목2, 항목3
  // data: 10, 20, 30
  // colors: #색1, #색2, #색3  (선택)
  // ```
  function renderChartBlocks(container) {
    if (!window.Chart) return;
    const blocks = container.querySelectorAll('code.language-chart');
    let chartIdx = 0;
    blocks.forEach(block => {
      chartIdx++;
      const lines = block.textContent.trim().split('\n');
      const cfg = {};
      lines.forEach(l => {
        const m = l.match(/^(\w+)\s*:\s*(.+)$/);
        if (m) cfg[m[1].trim().toLowerCase()] = m[2].trim();
      });

      const type    = cfg.type    || 'bar';
      const title   = cfg.title   || '';
      const labels  = (cfg.labels || '').split(',').map(s => s.trim());
      const data    = (cfg.data   || '').split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
      const defaultColors = ['#0D1B3D','#C8A244','#4A6080','#8BA3C7','#D4A96A','#6B8E9F','#2A3F63','#E8D5A3'];
      const colors  = cfg.colors
        ? cfg.colors.split(',').map(s => s.trim())
        : defaultColors.slice(0, data.length);

      const wrapper = document.createElement('div');
      wrapper.className = 'chart-wrapper';
      if (title) {
        const h = document.createElement('div');
        h.className = 'chart-title';
        h.textContent = title;
        wrapper.appendChild(h);
      }

      const canvas = document.createElement('canvas');
      canvas.id = 'netax-chart-' + chartIdx;
      canvas.style.maxHeight = '320px';
      wrapper.appendChild(canvas);
      block.closest('pre').replaceWith(wrapper);

      new Chart(canvas, {
        type,
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderColor: type === 'line' ? colors[0] : colors,
            borderWidth: type === 'line' ? 2 : 1,
            fill: type === 'line' ? false : undefined,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: ['pie','doughnut','radar'].includes(type) },
            title: { display: false },
          },
          scales: ['pie','doughnut','radar'].includes(type) ? {} : {
            y: { beginAtZero: true, ticks: { font: { family: "'Noto Sans KR'" } } },
            x: { ticks: { font: { family: "'Noto Sans KR'" } } },
          },
        }
      });
    });
  }

  // ===== Prism.js 코드 하이라이팅 =====
  // 문법: ```js, ```python, ```sql 등 일반 코드블록
  function renderPrismBlocks(container) {
    if (!window.Prism) return;
    Prism.highlightAllUnder(container);
  }

  // ===== 타임라인 렌더링 =====
  // 문법: ```timeline
  // 2015.01 : 201호 취득
  // 2021.03 : 이혼·합가
  // 2026.07 : 매매 예정
  // ```
  function renderTimelineBlocks(container) {
    const blocks = container.querySelectorAll('code.language-timeline');
    blocks.forEach(block => {
      const lines = block.textContent.trim().split('\n').filter(l => l.includes(':'));
      const wrapper = document.createElement('div');
      wrapper.className = 'timeline-chart';
      lines.forEach(l => {
        const idx = l.indexOf(':');
        const date  = l.slice(0, idx).trim();
        const label = l.slice(idx + 1).trim();
        wrapper.innerHTML += `
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-date">${date}</div>
            <div class="timeline-label">${label}</div>
          </div>`;
      });
      block.closest('pre').replaceWith(wrapper);
    });
  }

  // Mermaid 다이어그램을 NETAX 브랜드 컬러로 초기화
  if (window.mermaid) {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: '#0D1B3D',
        primaryTextColor: '#F8F6F0',
        primaryBorderColor: '#C8A244',
        lineColor: '#C8A244',
        secondaryColor: '#2A3F63',
        tertiaryColor: '#F5F1E8',
        fontFamily: "'Noto Sans KR', sans-serif",
        fontSize: '13px',
      },
      flowchart: {
        htmlLabels: true,
        nodeSpacing: 24,
        rankSpacing: 36,
        padding: 8,
        curve: 'basis',
      },
    });
  }

  // 마크다운 안의 ```mermaid 코드블록을 실제 도식으로 변환
  async function renderMermaidBlocks(container) {
    if (!window.mermaid) return;
    const blocks = container.querySelectorAll('code.language-mermaid');
    let i = 0;
    for (const block of blocks) {
      i++;
      try {
        const { svg } = await mermaid.render('mermaid-diagram-' + i, block.textContent);
        const wrapper = document.createElement('div');
        wrapper.className = 'mermaid-diagram';
        wrapper.innerHTML = svg;
        block.closest('pre').replaceWith(wrapper);
      } catch (err) {
        // 문법 오류 시 원본 코드블록 그대로 유지
      }
    }
  }

  // ===== 유니코드 불릿 문자(•●▪◦‣ 등) → 마크다운 목록 기호(-) 치환 =====
  // 구글독스 등 자동서식 기능을 거치면 "* 항목" 같은 마크다운 목록 표기가
  // 실제 유니코드 불릿 문자(•)로 바뀌어 저장되는 경우가 있다. marked.js는
  // *, -, + 만 목록 기호로 인식하므로, 이런 문서는 목록이 아니라 그냥
  // 문단 텍스트로 처리되어 버린다. 파싱 전에 줄 앞머리(들여쓰기 허용)의
  // 불릿류 문자를 표준 마크다운 목록 기호로 되돌린다.
  function fixBulletChars(mdText) {
    return mdText.replace(/^([ \t]*)[•●▪◦‣][ \t]+/gm, '$1- ');
  }

  // ===== 보이지 않는(또는 잘 구분되지 않는) 오염 문자 정규화 =====
  // Word/한글/구글독스 등에서 복사·붙여넣기하거나, 한글 입력기 환경에서
  // 반복 편집·저장할 때 일반 공백 자리에 다른 유니코드 공백류 문자가
  // 섞여 들어가는 경우가 흔하다. 특히:
  //   - NBSP(비파괴공백, U+00A0) 등 폭이 1칸인 공백류 문자
  //   - 전각공백(U+3000, Ideographic Space) — 한글 환경에서 특히 흔하며 폭이 2칸
  // marked.js는 이런 문자를 공백으로 인식하지 않아 들여쓰기 목록·중첩 목록·
  // 수평선(---) 인식이 실패하므로, 파싱 전에 반드시 일반 공백으로 치환한다.
  // 전각공백은 시각적 폭이 2칸이므로 들여쓰기 폭 보존을 위해 공백 2개로 치환한다.
  // 제로폭 문자(zero-width space 등)는 화면에 안 보이면서 파싱만 방해하므로 제거한다.
  function sanitizeInvisibleChars(mdText) {
    return mdText
      .replace(/\u3000/g, '  ')
      .replace(/[\u00A0\u1680\u2000-\u200A\u202F\u205F]/g, ' ')
      .replace(/[\u200B\u200C\u200D\uFEFF]/g, '');
  }

  // ===== 볼드(**) 렌더링 버그 방어: marked.js 12.0.2는 닫는 **가 (특히 따옴표 등
  // 문장부호 뒤에서) 공백 없이 한글 등 비ASCII 문자와 바로 붙으면 볼드로 인식하지
  // 못하는 결함이 있다. **...** 구간을 marked가 보기 전에 직접 <strong> 태그로
  // 치환해 이 버그를 원천적으로 우회한다.
  // 또한 여러 차례 편집·저장 과정에서 별표 앞에 백슬래시가 중첩 이스케이프되는
  // 경우(\*\*, \\\*\\\* 등)가 있어, 별표 앞 백슬래시를 먼저 정리한다.
  function preprocessBold(mdText) {
    mdText = sanitizeInvisibleChars(mdText);
    mdText = fixBulletChars(mdText);
    // 1) 별표 앞에 누적된 백슬래시 제거 (의도적 이스케이프보다 중첩오염이 훨씬 흔함)
    mdText = mdText.replace(/\\+(\*)/g, '$1');
    // 2) **텍스트** 구간을 marked 파싱 전에 직접 <strong>으로 치환 (줄바꿈·중첩 별표 제외)
    mdText = mdText.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
    return mdText;
  }

  // ===== 각주 처리: [^1] 형식을 실제 각주로 변환 =====
  // 작성 과정에서 대괄호가 실수로 이스케이프(\[^1] 형태)되어도
  // 정상 인식하도록 앞의 백슬래시 유무를 허용한다.
  function preprocessFootnotes(mdText) {
    const defs = {};
    const order = [];
    // 각주 정의 줄 [^1]: 내용  을 찾아서 제거하고 저장 (선행 \ 허용)
    mdText = mdText.replace(/^\\?\[\^([^\]]+)\]:\s*(.+)$/gm, (m, id, def) => {
      defs[id] = def;
      return '';
    });
    if (Object.keys(defs).length === 0) return mdText;

    // 본문 중 [^1] 참조를 위첨자 링크로 변환 (선행 \ 허용)
    mdText = mdText.replace(/\\?\[\^([^\]]+)\]/g, (m, id) => {
      if (!(id in defs)) return m;
      if (!order.includes(id)) order.push(id);
      const num = order.indexOf(id) + 1;
      return `<sup id="fnref-${id}"><a href="#fn-${id}">[${num}]</a></sup>`;
    });

    if (order.length > 0) {
      let footnoteSection = '\n\n## 각주\n\n';
      order.forEach((id, i) => {
        footnoteSection += `${i + 1}. <span id="fn-${id}">${defs[id]}</span> <a href="#fnref-${id}">↩</a>\n`;
      });
      mdText += footnoteSection;
    }
    return mdText;
  }

  // ===== 숫자 비교 막대그래프: ```compare 코드블록을 그래프로 변환 =====
  function renderCompareBars(container) {
    const blocks = container.querySelectorAll('code.language-compare');
    blocks.forEach(block => {
      const lines = block.textContent.trim().split('\n').filter(l => l.includes(':'));
      const items = lines.map(l => {
        const idx = l.lastIndexOf(':');
        return { label: l.slice(0, idx).trim(), value: parseFloat(l.slice(idx + 1).replace(/,/g, '').trim()) };
      }).filter(it => !isNaN(it.value));
      if (items.length === 0) return;

      const max = Math.max(...items.map(it => it.value));
      const wrapper = document.createElement('div');
      wrapper.className = 'compare-chart';
      items.forEach(it => {
        const pct = max > 0 ? (it.value / max * 100) : 0;
        const row = document.createElement('div');
        row.className = 'compare-row';
        row.innerHTML = `
          <div class="compare-label">${it.label}</div>
          <div class="compare-track"><div class="compare-fill" style="width:${pct}%"></div></div>
          <div class="compare-value">${it.value.toLocaleString()}</div>
        `;
        wrapper.appendChild(row);
      });
      block.closest('pre').replaceWith(wrapper);
    });
  }

  // ===== 표 스크롤 힌트: 실제로 화면보다 넓어 스크롤이 필요한 표에만, 스크롤 위치에 따라 좌/우 화살표 표시 =====
  function updateScrollHint(el) {
    const maxScroll = el.scrollWidth - el.clientWidth;
    el.classList.toggle('show-right', el.scrollLeft < maxScroll - 2);
    el.classList.toggle('show-left', el.scrollLeft > 2);
  }

  function markScrollableTables(container) {
    container.querySelectorAll('.table-scroll').forEach(el => {
      if (el.scrollWidth > el.clientWidth + 1) {
        const isNew = !el.classList.contains('scrollable');
        el.classList.add('scrollable');
        updateScrollHint(el);
        if (isNew) el.addEventListener('scroll', () => updateScrollHint(el));
      }
    });
  }

  // ===== 알림 상자 색상 구분: 인용문 첫 글자(이모지)로 판별해 색상만 부여하고, 이모지 글자 자체는 화면에서 제거 =====
  function applyCalloutColors(container) {
    const quotes = container.querySelectorAll('blockquote');
    quotes.forEach(bq => {
      const text = bq.textContent.trim();
      let cls = null, stripRe = null;
      if (text.startsWith('✅')) { cls = 'callout-success'; stripRe = /^✅\s*/; }
      else if (text.startsWith('⚠️') || text.startsWith('⚠')) { cls = 'callout-warning'; stripRe = /^⚠️?\s*/; }
      else if (text.startsWith('❌') || text.startsWith('🚫')) { cls = 'callout-danger'; stripRe = /^(❌|🚫)\s*/; }
      else if (text.startsWith('ℹ️') || text.startsWith('ℹ')) { cls = 'callout-info'; stripRe = /^ℹ️?\s*/; }
      if (!cls) return;
      bq.classList.add(cls);
      // 판별에 쓴 이모지는 표시 텍스트에서만 제거 (판별 로직은 원본 이모지에 의존하므로 마크다운 원문은 그대로 유지)
      const walker = document.createTreeWalker(bq, NodeFilter.SHOW_TEXT);
      const firstTextNode = walker.nextNode();
      if (firstTextNode) {
        firstTextNode.textContent = firstTextNode.textContent.replace(stripRe, '');
      }
    });
  }

  // ===== 목차 자동 생성: h2(장 제목) 기준으로 상단에 네비게이션 삽입 =====
  function buildTableOfContents(container) {
    // 1번: "기본 사실관계" 등 머리말 h2는 목차에서 제외 — 텍스트 내용으로 필터링
    const EXCLUDE_HEADINGS = ['기본 사실관계'];
    const headings = Array.from(container.querySelectorAll('h2')).filter(h => {
      const text = h.textContent.trim();
      return !EXCLUDE_HEADINGS.some(ex => text.startsWith(ex));
    });
    if (headings.length < 2) return;

    const toc = document.createElement('nav');
    toc.className = 'toc';
    let tocHtml = '<div class="toc-title">목차</div><ul>';
    headings.forEach((h, i) => {
      const id = 'section-' + i;
      h.id = id;
      const label = h.textContent.trim();
      tocHtml += `<li><a href="#${id}">${label}</a></li>`;
    });
    tocHtml += '</ul>';
    toc.innerHTML = tocHtml;

    const firstH1 = container.querySelector('h1');
    if (firstH1) {
      firstH1.after(toc);
    } else {
      container.prepend(toc);
    }
  }

  function showResult(data) {
    document.getElementById('customerName').textContent = data.customer_name;
    const frame = document.getElementById('materialFrame');
    const contentEl = document.getElementById('materialContent');
    const viewerEl = document.getElementById('viewer');

    // 권한 "차단"이면 인쇄/복사/드래그 선택 방지
    if (data.download_allowed === false) {
      viewerEl.classList.add('protected');
    } else {
      viewerEl.classList.remove('protected');
    }

    if (data.report_content) {
      // 마크다운 원문을 브랜드 스타일로 직접 렌더링
      frame.style.display = 'none';
      contentEl.style.display = 'block';
      const processedMd = preprocessBold(preprocessFootnotes(data.report_content));
      let renderedHtml = marked.parse(processedMd);
      renderedHtml = renderedHtml
        .replace(/<table>/g, '<div class="table-scroll"><table>')
        .replace(/<\/table>/g, '</table></div>');
      contentEl.innerHTML = renderedHtml;
      renderMermaidBlocks(contentEl);
      renderCompareBars(contentEl);
      renderChartBlocks(contentEl);
      renderTimelineBlocks(contentEl);
      renderPrismBlocks(contentEl);
      renderKatex(contentEl);
      applyCalloutColors(contentEl);
      buildTableOfContents(contentEl);
    } else {
      // 기존 방식: 구글 드라이브 파일을 iframe으로 표시
      contentEl.style.display = 'none';
      frame.style.display = 'block';
      if (data.material_link.startsWith('srcdoc:')) {
        frame.removeAttribute('src');
        frame.srcdoc = data.material_link.slice(7);
      } else {
        frame.removeAttribute('srcdoc');
        frame.src = toEmbedUrl(data.material_link);
      }
    }

    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('viewer').style.display = 'flex';

    // 뷰어가 화면에 실제로 보이게 된 뒤에 측정해야 scrollWidth/clientWidth가 정확함
    // (display:none 상태에서 재면 항상 0이라 넘침 감지가 안 됨)
    if (data.report_content) {
      markScrollableTables(contentEl);
    }

    // 스크롤 위치를 맨 위로 강제 초기화 (이전 위치나 브라우저 자동 스크롤 보정으로
    // 중간부터 보이는 문제 방지). 비동기 렌더링(mermaid 등) 이후에도 한 번 더 보정.
    const frameWrap = document.querySelector('.viewer-frame-wrap');
    window.scrollTo(0, 0);
    if (frameWrap) frameWrap.scrollTop = 0;
    requestAnimationFrame(() => {
      window.scrollTo(0, 0);
      if (frameWrap) frameWrap.scrollTop = 0;
    });
    setTimeout(() => {
      window.scrollTo(0, 0);
      if (frameWrap) frameWrap.scrollTop = 0;
      if (data.report_content) markScrollableTables(contentEl);
    }, 300);
  }

  document.getElementById('materialContent').addEventListener('contextmenu', (e) => {
    if (document.getElementById('viewer').classList.contains('protected')) {
      e.preventDefault();
    }
  });

  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const viewer = document.getElementById('viewer');
    if (!document.fullscreenElement) {
      (viewer.requestFullscreen || viewer.webkitRequestFullscreen)?.call(viewer);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    }
  });

  // 전체화면 상태에 따라 버튼 아이콘·라벨 전환 (ESC로 빠져나가는 경우도 정확히 반영됨)
  function updateFullscreenBtnLabel() {
    const btn = document.getElementById('fullscreenBtn');
    const isFullscreen = !!document.fullscreenElement;
    btn.innerHTML = isFullscreen
      ? '⤡ <span class="btn-label">기본보기</span>'
      : '⤢ <span class="btn-label">전체화면</span>';
    btn.title = isFullscreen ? '기본 화면으로 보기' : '전체화면으로 보기';
  }
  document.addEventListener('fullscreenchange', updateFullscreenBtnLabel);
  document.addEventListener('webkitfullscreenchange', updateFullscreenBtnLabel);

  // ===== 관리자 우회: ?report_id=7K4M&admin=관리자코드 로 접속하면 자동 진입 =====
  if (prefilledId && adminCodeParam) {
    // 응답을 기다리지 않고 즉시 로그인 화면을 가려서, 확인 버튼이 보이는 순간 자체를 없앤다
    document.getElementById('loginCard').style.display = 'none';
    callBackend({ report_id: prefilledId, admin_code: adminCodeParam }).then(data => {
      if (data.success) {
        showResult(data);
      } else {
        // 실패 시에만 다시 로그인 화면을 보여줌
        document.getElementById('loginCard').style.display = 'block';
        messageEl.textContent = data.message || '관리자 우회 실패';
        messageEl.className = 'message error';
      }
    });
  }

  // ===== 한글 자판으로 잘못 입력된 열람번호를 영문으로 역변환 =====
  // 두벌식 자판 기준: 한글 입력 시 눌렸던 실제 키(영문)를 복원
  const HANGUL_TO_QWERTY = {
    'ㅂ':'q','ㅈ':'w','ㄷ':'e','ㄱ':'r','ㅅ':'t','ㅛ':'y','ㅕ':'u','ㅑ':'i','ㅐ':'o','ㅔ':'p',
    'ㅁ':'a','ㄴ':'s','ㅇ':'d','ㄹ':'f','ㅎ':'g','ㅗ':'h','ㅓ':'j','ㅏ':'k','ㅣ':'l',
    'ㅋ':'z','ㅌ':'x','ㅊ':'c','ㅍ':'v','ㅠ':'b','ㅜ':'n','ㅡ':'m',
    'ㅃ':'Q','ㅉ':'W','ㄸ':'E','ㄲ':'R','ㅆ':'T','ㅒ':'O','ㅖ':'P',
  };

  function decomposeHangul(ch) {
    const code = ch.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) return null; // 완성형 한글 범위 밖
    const CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
    const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    const idx = code - 0xAC00;
    const cho  = CHO[Math.floor(idx / (21 * 28))];
    const jung = JUNG[Math.floor((idx % (21 * 28)) / 28)];
    const jong = JONG[idx % 28];
    return { cho, jung, jong };
  }

  // 열람번호는 영문·숫자 조합이 원칙이므로, 완성형 한글이 섞여 있으면
  // 두벌식 자판 매핑으로 되돌려 원래 눌렀을 영문 키 조합으로 복원한다.
  function normalizeReportId(raw) {
    let result = '';
    for (const ch of raw) {
      // 조합되지 않은 낱자(자음/모음)가 그대로 들어온 경우 — 바로 매핑
      if (HANGUL_TO_QWERTY[ch]) {
        result += HANGUL_TO_QWERTY[ch];
        continue;
      }
      // 완성형 한글(가~힣)인 경우 — 초성·중성·종성으로 분해 후 매핑
      const parts = decomposeHangul(ch);
      if (!parts) {
        result += ch; // 이미 영문/숫자면 그대로
        continue;
      }
      if (HANGUL_TO_QWERTY[parts.cho]) result += HANGUL_TO_QWERTY[parts.cho];
      if (HANGUL_TO_QWERTY[parts.jung]) result += HANGUL_TO_QWERTY[parts.jung];
      if (parts.jong && HANGUL_TO_QWERTY[parts.jong]) result += HANGUL_TO_QWERTY[parts.jong];
    }
    return result;
  }

  // 열람번호 형식 정리 — 영문·숫자만 남기고 4자로 제한
  function formatReportId(raw) {
    return raw.replace(/[^A-Za-z0-9]/g, '').slice(0, 4);
  }

  // 타이핑하는 동안 4자리마다 자동으로 하이픈 삽입 (XXXX-XXXX)
  document.getElementById('reportId').addEventListener('input', (e) => {
    const cursorAtEnd = e.target.selectionEnd === e.target.value.length;
    e.target.value = formatReportId(e.target.value);
    if (cursorAtEnd) e.target.setSelectionRange(e.target.value.length, e.target.value.length);
  });

  // ===== 1단계: 열람번호 확인 =====
  idForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rawInput = document.getElementById('reportId').value.trim();
    const reportId = formatReportId(normalizeReportId(rawInput)).toUpperCase();
    if (!reportId) return;

    idSubmitBtn.disabled = true;
    idSubmitBtn.textContent = '확인 중...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const data = await callBackend({ report_id: reportId });

      if (data.needs_setup) {
        // 최초 접속 -> 비밀번호 설정 (같은 화면, placeholder와 안내문구 자리의 텍스트만 교체)
        currentReportId = reportId;
        passwordInput.placeholder = '비밀번호 설정';
        introDynamicText.innerHTML = '지금 설정하시는 비밀번호로<br>계속 접속하시면 됩니다.';
        introDynamicText.classList.add('setup-notice');
        idForm.style.display = 'none';
        passwordForm.style.display = 'block';
      } else if (data.needs_login) {
        // 이미 비밀번호 설정됨 -> 로그인 화면
        currentReportId = reportId;
        passwordInput.placeholder = '비밀번호 입력';
        introDynamicText.innerHTML = '열람가능 기간은<br>발급일로부터 30일입니다.';
        introDynamicText.classList.remove('setup-notice');
        idForm.style.display = 'none';
        passwordForm.style.display = 'block';
      } else if (data.success) {
        // 관리자 우회 등으로 비밀번호 없이 바로 통과되는 경우
        showResult(data);
      } else {
        messageEl.textContent = data.message || '확인할 수 없습니다.';
        messageEl.className = 'message error';
      }
    } catch (err) {
      messageEl.textContent = '연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
      messageEl.className = 'message error';
    } finally {
      idSubmitBtn.disabled = false;
      idSubmitBtn.textContent = '확인';
    }
  });

  // ===== 2단계: 비밀번호 설정 또는 로그인 =====
  passwordForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = '확인 중...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const passwordHash = await sha256(password);
      const data = await callBackend({ report_id: currentReportId, password_hash: passwordHash });

      if (data.success) {
        showResult(data);
      } else {
        messageEl.textContent = data.message || '열람에 실패했습니다.';
        messageEl.className = 'message error';
      }
    } catch (err) {
      messageEl.textContent = '연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
      messageEl.className = 'message error';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '열람하기';
    }
  });
</script>
