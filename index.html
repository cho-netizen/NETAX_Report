<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>자문보고서 열람 | NETAX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root {
    --navy: #0D1B3D;
    --navy-deep: #081226;
    --cream: #F8F6F0;
    --gold: #C8A244;
    --gold-light: #DCC17E;
    --error: #B14545;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy-deep);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(176,141,87,0.08), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(176,141,87,0.06), transparent 45%);
    color: var(--cream);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--navy);
    border: 1px solid rgba(176,141,87,0.25);
    border-radius: 4px;
    padding: 48px 36px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
    border-radius: 4px 4px 0 0;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
    border-radius: 0 0 4px 4px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 27px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 22px;
    color: var(--cream);
  }

  h1::after {
    content: '';
    display: block;
    width: 48px;
    height: 2px;
    background: var(--gold);
    margin: 22px auto 0;
  }

  .footer-highlight .highlight-strong {
    font-family: 'Nanum Myeongjo', serif;
    color: var(--gold-light);
    font-weight: 800;
    font-size: 20px;
  }

  .footer-highlight {
    margin-top: 8px;
    margin-bottom: 32px;
    font-size: 15px;
    color: var(--cream);
    text-align: center;
    line-height: 1.75;
  }

  .footer-highlight .highlight {
    font-family: 'Noto Serif KR', serif;
    color: var(--gold-light);
    font-weight: 600;
  }

  .field-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field-row input {
    flex: 1;
    min-width: 0;
  }

  .field-row button {
    width: auto;
    white-space: nowrap;
    padding: 0 22px;
    margin-top: 0;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 13px 14px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 3px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  input::placeholder { color: rgba(246,243,236,0.55); }

  input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(255,255,255,0.06);
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: var(--gold);
    color: var(--navy-deep);
    border: none;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    letter-spacing: 0.02em;
  }

  button:hover:not(:disabled) { background: var(--gold-light); }
  button:active:not(:disabled) { transform: scale(0.99); }

  button:disabled {
    background: rgba(255,255,255,0.08);
    color: rgba(246,243,236,0.4);
    cursor: not-allowed;
    box-shadow: none;
  }

  .message {
    margin-top: 8px;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
    min-height: 0;
  }

  .message.error { color: var(--error); }

  /* ===== 열람 화면 ===== */
  .viewer {
    display: none;
    width: 100%;
    max-width: 960px;
    height: 100dvh;
    max-height: 900px;
    flex-direction: column;
    background: var(--cream);
    border-radius: 4px;
    overflow: hidden;
  }

  .viewer-header {
    background: var(--navy);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .viewer-header .greeting {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    color: var(--cream);
  }

  .viewer-header .greeting span { color: var(--gold-light); }

  .viewer-header .expiry {
    font-size: 11px;
    color: var(--cream);
  }

  .viewer-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #fullscreenBtn {
    width: auto;
    padding: 6px 12px;
    margin-top: 0;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    color: var(--cream);
    font-weight: 500;
  }

  #fullscreenBtn:hover { background: rgba(255,255,255,0.18); }

  /* 폰을 가로로 눕혔을 때: 헤더 최소화해서 보고서 공간 최대 확보 */
  @media (orientation: landscape) and (max-height: 500px) {
    .viewer-header {
      padding: 6px 14px;
    }
    .viewer-header .greeting {
      font-size: 12px;
    }
    .viewer-header .expiry {
      display: none;
    }
    #fullscreenBtn {
      padding: 4px 10px;
      font-size: 10px;
    }
  }

  .viewer-frame-wrap {
    flex: 1;
    background: #fff;
    overflow-y: auto;
  }

  .md-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 32px 80px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #22303F;
    line-height: 1.8;
    font-size: 15.5px;
  }

  .md-content h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    text-align: left;
    letter-spacing: normal;
    margin: 0 0 8px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--gold);
  }

  .md-content h1::after { display: none; }

  .md-content h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--navy);
    margin: 34px 0 12px;
    padding: 10px 14px;
    background: linear-gradient(90deg, rgba(200,162,68,0.14), rgba(200,162,68,0));
    border-bottom: 2px solid var(--gold);
  }

  .md-content h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin: 24px 0 10px;
  }

  .md-content p { margin: 0 0 14px; }

  .md-content strong {
    color: var(--navy);
    background: linear-gradient(transparent 60%, rgba(200,162,68,0.28) 60%);
    font-weight: 700;
  }

  .md-content ul, .md-content ol {
    margin: 0 0 14px;
    padding-left: 22px;
  }

  .md-content li { margin-bottom: 6px; }

  .md-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 24px;
    font-size: 14px;
  }

  .md-content th {
    background: #2A3F63;
    color: var(--cream);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
  }

  .md-content td:first-child,
  .md-content th:first-child {
    letter-spacing: -0.06em;
    transform: scaleX(0.92);
    transform-origin: left;
  }

  .md-content td {
    padding: 9px 12px;
    border-bottom: 1px solid #E4E0D8;
  }

  .md-content tr:nth-child(even) td { background: #FAF8F3; }

  .md-content blockquote {
    margin: 0 0 18px;
    padding: 12px 16px;
    background: #F5F1E8;
    color: #4A4A4A;
  }

  .md-content blockquote p {
    margin: 0;
    padding-left: 1.6em;
    text-indent: -1.6em;
  }

  .md-content hr {
    border: none;
    border-top: 1px solid #E4E0D8;
    margin: 28px 0;
  }

  .viewer-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .footer-brand {
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .footer-logo {
    height: 16px;
    opacity: 0.85;
    flex-shrink: 0;
  }

  .footer-divider {
    width: 1px;
    align-self: stretch;
    background: rgba(255,255,255,0.12);
  }

  .footer-brand-text {
    font-size: 13px;
    color: var(--cream);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  @media (max-width: 480px) {
    body { padding: 0; align-items: stretch; }
    .card {
      max-width: 100%;
      min-height: 100dvh;
      border-radius: 0;
      border-left: none;
      border-right: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px 24px 16px;
    }
    .card::before, .card::after { border-radius: 0; }
    h1 { font-size: 21px; white-space: nowrap; }
  }
</style>
</head>
<body>

  <!-- 로그인 카드 -->
  <div class="card" id="loginCard">
    <h1>Consulting Report</h1>

    <p class="footer-highlight">이 <span class="highlight-strong">자문용역 보고서</span> 는<br>고객님을 위해 <span class="highlight">맞춤형</span>으로<br>종이문서가 아닌 <span class="highlight">전용 페이지</span>로<br>특별히 제작하여<br>드리는 문서입니다.<br>스마트기기로 언제 어디서든<br>열람하실 수 있습니다.<br>열람가능 기간은<br>발급일로부터 30일입니다.</p>

    <form id="idForm">
      <div class="field-row">
        <input type="text" id="reportId" placeholder="열람번호 입력" aria-label="열람번호" autocomplete="off" required>
        <button type="submit" id="idSubmitBtn">확인</button>
      </div>
    </form>

    <form id="passwordForm" style="display:none;">
      <div class="field-row" id="passwordRow">
        <input type="password" id="password" placeholder="비밀번호" aria-label="비밀번호" autocomplete="off" required>
        <button type="submit" id="submitBtn">열람하기</button>
      </div>
      <div class="field-row" id="passwordConfirmField" style="display:none;">
        <input type="password" id="passwordConfirm" placeholder="비밀번호 확인" aria-label="비밀번호 확인" autocomplete="off">
      </div>
    </form>

    <div class="message" id="message"></div>

    <div class="footer-brand">
      <img src="netax-wordmark.png" alt="NETAX" class="footer-logo">
      <div class="footer-divider"></div>
      <div class="footer-brand-text">이음세무컨설팅<br>조종호 세무사</div>
    </div>
  </div>

  <!-- 열람 화면 -->
  <div class="viewer" id="viewer">
    <div class="viewer-header" id="viewerHeader">
      <div class="greeting"><span id="customerName"></span> 고객님, 자문보고서입니다</div>
      <div class="viewer-header-right">
        <div class="expiry">이음세무컨설팅 · NETAX</div>
        <button type="button" id="fullscreenBtn" title="전체화면으로 보기">⛶ 전체화면</button>
      </div>
    </div>
    <div class="viewer-frame-wrap">
      <iframe id="materialFrame" title="자문보고서" style="display:none;"></iframe>
      <div id="materialContent" class="md-content" style="display:none;"></div>
    </div>
  </div>

<script>
  // ===== 설정 =====
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyg0gDbzPPkpZs2Gnsuw7Qh_qszYy1_8f2Q-SN7Ffreoc3GfHzIZ7B5UXNidT5ale_b/exec';

  // URL에 ?report_id=R001 형태로 넘어오면 자동 채움
  const urlParams = new URLSearchParams(window.location.search);
  const prefilledId = urlParams.get('report_id');
  const adminCodeParam = urlParams.get('admin');
  if (prefilledId) document.getElementById('reportId').value = prefilledId;

  async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function toEmbedUrl(link) {
    // 구글 드라이브/문서/슬라이드 링크는 /preview 형태여야 iframe 임베드가 잘 됩니다.
    if (link.includes('/edit')) return link.replace(/\/edit.*$/, '/preview');
    if (link.includes('/view')) return link.replace(/\/view.*$/, '/preview');
    return link;
  }

  const idForm = document.getElementById('idForm');
  const idSubmitBtn = document.getElementById('idSubmitBtn');
  const passwordForm = document.getElementById('passwordForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageEl = document.getElementById('message');
  const passwordInput = document.getElementById('password');
  const passwordRow = document.getElementById('passwordRow');
  const passwordConfirmField = document.getElementById('passwordConfirmField');

  let currentReportId = '';
  let isNewSetup = false;

  async function callBackend(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  function showResult(data) {
    document.getElementById('customerName').textContent = data.customer_name;
    const frame = document.getElementById('materialFrame');
    const contentEl = document.getElementById('materialContent');

    if (data.report_content) {
      // 마크다운 원문을 브랜드 스타일로 직접 렌더링
      frame.style.display = 'none';
      contentEl.style.display = 'block';
      contentEl.innerHTML = marked.parse(data.report_content);
    } else {
      // 기존 방식: 구글 드라이브 파일을 iframe으로 표시
      contentEl.style.display = 'none';
      frame.style.display = 'block';
      if (data.material_link.startsWith('srcdoc:')) {
        frame.removeAttribute('src');
        frame.srcdoc = data.material_link.slice(7);
      } else {
        frame.removeAttribute('srcdoc');
        frame.src = toEmbedUrl(data.material_link);
      }
    }

    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('viewer').style.display = 'flex';
  }

  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const viewer = document.getElementById('viewer');
    if (!document.fullscreenElement) {
      (viewer.requestFullscreen || viewer.webkitRequestFullscreen)?.call(viewer);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    }
  });

  // ===== 관리자 우회: ?report_id=R001&admin=관리자코드 로 접속하면 자동 진입 =====
  if (prefilledId && adminCodeParam) {
    callBackend({ report_id: prefilledId, admin_code: adminCodeParam }).then(data => {
      if (data.success) {
        showResult(data);
      } else {
        messageEl.textContent = data.message || '관리자 우회 실패';
        messageEl.className = 'message error';
      }
    });
  }

  // ===== 1단계: 열람번호 확인 =====
  idForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const reportId = document.getElementById('reportId').value.trim();
    if (!reportId) return;

    idSubmitBtn.disabled = true;
    idSubmitBtn.textContent = '확인 중...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const data = await callBackend({ report_id: reportId });

      if (data.needs_setup) {
        // 최초 접속 -> 비밀번호 설정 화면
        currentReportId = reportId;
        isNewSetup = true;
        passwordInput.placeholder = '새 비밀번호 설정';
        passwordConfirmField.style.display = 'flex';
        document.getElementById('passwordConfirm').required = true;
        passwordConfirmField.appendChild(submitBtn);
        idForm.style.display = 'none';
        passwordForm.style.display = 'block';
      } else if (data.needs_login) {
        // 이미 비밀번호 설정됨 -> 로그인 화면
        currentReportId = reportId;
        isNewSetup = false;
        passwordInput.placeholder = '비밀번호 입력';
        passwordConfirmField.style.display = 'none';
        document.getElementById('passwordConfirm').required = false;
        passwordRow.appendChild(submitBtn);
        idForm.style.display = 'none';
        passwordForm.style.display = 'block';
      } else if (data.success) {
        // 관리자 우회 등으로 비밀번호 없이 바로 통과되는 경우
        showResult(data);
      } else {
        messageEl.textContent = data.message || '확인할 수 없습니다.';
        messageEl.className = 'message error';
      }
    } catch (err) {
      messageEl.textContent = '연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
      messageEl.className = 'message error';
    } finally {
      idSubmitBtn.disabled = false;
      idSubmitBtn.textContent = '확인';
    }
  });

  // ===== 2단계: 비밀번호 설정 또는 로그인 =====
  passwordForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;

    if (isNewSetup && password !== passwordConfirm) {
      messageEl.textContent = '비밀번호가 서로 일치하지 않습니다.';
      messageEl.className = 'message error';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '확인 중...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const passwordHash = await sha256(password);
      const data = await callBackend({ report_id: currentReportId, password_hash: passwordHash });

      if (data.success) {
        showResult(data);
      } else {
        messageEl.textContent = data.message || '열람에 실패했습니다.';
        messageEl.className = 'message error';
      }
    } catch (err) {
      messageEl.textContent = '연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
      messageEl.className = 'message error';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '열람하기';
    }
  });
</script>

</body>
</html>
